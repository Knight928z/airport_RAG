<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白云机场知识库助手</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --line: #d9e0ee;
        --text: #1f2a44;
        --muted: #6b778c;
        --primary: #1e66f5;
        --danger: #d6336c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .title {
        margin: 0 0 6px;
        font-size: 26px;
      }
      .subtitle {
        margin: 0 0 18px;
        color: var(--muted);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      textarea {
        width: 100%;
        min-height: 88px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        resize: vertical;
        font-size: 15px;
      }
      button {
        border: none;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      button.secondary {
        background: #4c6ef5;
      }
      button:disabled {
        opacity: .7;
        cursor: not-allowed;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 8px;
      }
      .answer {
        white-space: pre-wrap;
        line-height: 1.65;
      }
      .citations {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      .citations li {
        margin-bottom: 10px;
        line-height: 1.55;
      }
      .hint {
        color: var(--muted);
        font-size: 13px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12px;
        border: 1px solid var(--line);
        color: #234;
        background: #eff3ff;
      }
      .chip {
        background: #eef2ff;
        color: #1e3a8a;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .error {
        color: var(--danger);
      }
      .hidden {
        display: none;
      }
      .feedback-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .feedback-row button {
        background: #334155;
      }
      .pre {
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.5;
        background: #f8faff;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 10px;
      }
      code {
        background: #eef2ff;
        border-radius: 6px;
        padding: 1px 6px;
      }
      .flight-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(180px, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .flight-cell {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        background: #fbfdff;
      }
      .flight-label {
        font-size: 12px;
        color: var(--muted);
      }
      .flight-value {
        margin-top: 4px;
        font-weight: 600;
        font-size: 14px;
      }
      .flight-actions {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .flight-details {
        margin-top: 10px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #f8faff;
      }
      .flight-detail-list {
        margin: 0;
        padding-left: 18px;
      }
      .flight-detail-list li {
        margin-bottom: 6px;
        line-height: 1.5;
      }
      .realtime-confirm {
        margin-top: 10px;
        border: 1px dashed var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #f8faff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 class="title">白云机场知识库助手</h1>
      <p class="subtitle">面向一线人员：输入业务问题，返回规范结论与引用依据。</p>

      <section class="card">
        <div class="row" style="justify-content: space-between; align-items: center;">
          <strong>知识库维护</strong>
          <button id="btn-ingest" class="secondary">同步最新文档（data/documents）</button>
        </div>
        <p class="meta" id="ingest-status">如果你刚更新了文档，请先点击同步。</p>
      </section>

      <section class="card">
        <label for="question"><strong>提问</strong></label>
        <textarea id="question" placeholder="示例：国内出发需要提前多久到达？"></textarea>
        <div class="row" style="margin-top: 10px; align-items: center;">
          <label class="hint"><input id="auto-sync" type="checkbox" checked /> 提问前自动同步文档</label>
          <label class="hint">引用条数
            <select id="top-k" style="margin-left: 6px; border: 1px solid var(--line); border-radius: 8px; padding: 4px 8px;">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="8">8</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top: 10px;">
          <button class="chip" data-q="国内出发需要提前多久到达？">国内出发提前多久到达</button>
          <button class="chip" data-q="国际出发海关检查要注意什么？">国际出发海关检查</button>
          <button class="chip" data-q="我的充电宝150Wh能带吗？">充电宝 150Wh 能带吗</button>
        </div>
        <div class="row" style="margin-top: 10px;">
          <button id="btn-ask">开始问答</button>
        </div>
        <p class="hint">当知识库没有相关证据时，系统会明确提示“无可用文档引用”。</p>
      </section>

      <section class="card">
        <div class="row" style="justify-content: space-between; align-items: center;">
          <strong>回答</strong>
          <span id="confidence" class="badge">状态：待提问</span>
        </div>
        <div id="answer" class="answer meta" style="margin-top: 8px;">等待提问...</div>
        <div id="realtime-confirm-box" class="realtime-confirm hidden">
          <div class="meta">系统暂无此航班信息，是否查询？</div>
          <div class="row" style="margin-top:8px;">
            <button id="btn-confirm-realtime" type="button" class="secondary">查询实时航班</button>
          </div>
        </div>
        <div class="feedback-row">
          <button id="btn-like" type="button">👍 点赞</button>
          <button id="btn-dislike" type="button">👎 点踩</button>
        </div>
        <textarea id="corrected-answer" placeholder="如果答案不准确，可在这里提交你认为正确的答案（用于后续知识库更新/模型优化）。" style="margin-top:10px; min-height:72px;"></textarea>
        <div class="row" style="margin-top:8px;">
          <button id="btn-submit-correction" type="button" class="secondary">提交纠错</button>
          <span id="feedback-status" class="meta"></span>
        </div>
      </section>

      <section id="realtime-flight-card" class="card hidden">
        <div class="row" style="justify-content: space-between; align-items: center;">
          <strong>实时航班卡片</strong>
          <span class="badge">来源：VariFlight MCP</span>
        </div>
        <div class="flight-grid">
          <div class="flight-cell"><div class="flight-label">航班号</div><div id="flight-no" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">状态</div><div id="flight-status" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">计划起飞</div><div id="flight-planned-dep" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">实际起飞</div><div id="flight-actual-dep" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">计划到达</div><div id="flight-planned-arr" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">实际到达</div><div id="flight-actual-arr" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">延误分钟</div><div id="flight-delay" class="flight-value">-</div></div>
          <div class="flight-cell"><div class="flight-label">航站楼 / 登机口</div><div id="flight-terminal-gate" class="flight-value">-</div></div>
        </div>
        <div class="flight-actions">
          <button id="flight-toggle-detail" type="button" class="secondary hidden">显示详细航班信息</button>
        </div>
        <div id="flight-details" class="flight-details hidden">
          <ol id="flight-detail-list" class="flight-detail-list"></ol>
        </div>
      </section>

      <section class="card">
        <strong>引用依据</strong>
        <ol id="citations" class="citations"></ol>
      </section>
    </div>

    <script>
      const askBtn = document.getElementById('btn-ask');
      const ingestBtn = document.getElementById('btn-ingest');
      const questionInput = document.getElementById('question');
      const answerEl = document.getElementById('answer');
      const citationsEl = document.getElementById('citations');
      const ingestStatus = document.getElementById('ingest-status');
  const autoSyncEl = document.getElementById('auto-sync');
  const topKEl = document.getElementById('top-k');
  const confidenceEl = document.getElementById('confidence');
  const chips = Array.from(document.querySelectorAll('.chip'));
  const likeBtn = document.getElementById('btn-like');
  const dislikeBtn = document.getElementById('btn-dislike');
  const correctedAnswerEl = document.getElementById('corrected-answer');
  const submitCorrectionBtn = document.getElementById('btn-submit-correction');
  const feedbackStatusEl = document.getElementById('feedback-status');
  const flightCardEl = document.getElementById('realtime-flight-card');
  const flightNoEl = document.getElementById('flight-no');
  const flightStatusEl = document.getElementById('flight-status');
  const flightPlannedDepEl = document.getElementById('flight-planned-dep');
  const flightActualDepEl = document.getElementById('flight-actual-dep');
  const flightPlannedArrEl = document.getElementById('flight-planned-arr');
  const flightActualArrEl = document.getElementById('flight-actual-arr');
  const flightDelayEl = document.getElementById('flight-delay');
  const flightTerminalGateEl = document.getElementById('flight-terminal-gate');
  const flightToggleDetailEl = document.getElementById('flight-toggle-detail');
  const flightDetailsEl = document.getElementById('flight-details');
  const flightDetailListEl = document.getElementById('flight-detail-list');
  const realtimeConfirmBoxEl = document.getElementById('realtime-confirm-box');
  const confirmRealtimeBtn = document.getElementById('btn-confirm-realtime');

  let lastResponse = null;
  let currentRealtimeDetails = null;
  let flightDetailLabelMap = {};
  let flightDetailLabelMapLoaded = false;
  let pendingRealtimeQuestion = '';

  const FLIGHT_DETAIL_PRIORITY = [
    'FlightNo', 'flight_no', 'flightNo',
    'FlightState', 'AssistFlightState', 'status', 'state',
    'DelayTime', 'delay_minutes', 'delayTime',
    'FlightDeptimePlanDate', 'planned_departure', 'scheduled_departure', 'std',
    'FlightDeptimeDate', 'actual_departure', 'atd',
    'FlightArrtimePlanDate', 'planned_arrival', 'scheduled_arrival', 'sta',
    'FlightArrtimeDate', 'actual_arrival', 'ata',
    'FlightHTerminal', 'departure_terminal',
    'FlightTerminal', 'arrival_terminal',
    'BoardGate', 'departure_gate', 'gate',
    'ReachExit', 'arrival_gate',
  ];

      async function loadFlightDetailLabelMappings() {
        try {
          const res = await fetch('/flight/field-mappings');
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || '加载字段映射失败');
          if (data && data.mappings && typeof data.mappings === 'object') {
            flightDetailLabelMap = data.mappings;
            flightDetailLabelMapLoaded = true;
            return;
          }
        } catch (_) {
          flightDetailLabelMap = {};
          flightDetailLabelMapLoaded = false;
        }
      }

      function normalizeFieldKey(key) {
        return String(key || '').replace(/^\uFEFF/, '').trim();
      }

      function getFlightDetailLabelByKey(key) {
        const raw = String(key || '');
        const clean = normalizeFieldKey(raw);
        const lower = clean.toLowerCase();

        const direct = flightDetailLabelMap[raw] || flightDetailLabelMap[clean] || flightDetailLabelMap[lower];
        if (direct) return String(direct).trim();

        const found = Object.entries(flightDetailLabelMap).find(([k]) => normalizeFieldKey(k).toLowerCase() === lower);
        if (found && found[1]) return String(found[1]).trim();

        return clean || raw;
      }

      function setError(message) {
        answerEl.textContent = message;
        answerEl.classList.add('error');
      }

      function clearError() {
        answerEl.classList.remove('error');
      }

      function renderCitations(citations) {
        citationsEl.innerHTML = '';
        if (!citations || citations.length === 0) {
          const li = document.createElement('li');
          li.textContent = '无可用引用。';
          citationsEl.appendChild(li);
          return;
        }

        citations.forEach((c) => {
          const li = document.createElement('li');
          li.innerHTML = `<div><strong>[${c.index}]</strong> ${c.snippet}</div>
            <div class="meta">来源：<code>${c.source}</code>${c.page ? ` ｜ 页码：${c.page}` : ''}</div>`;
          citationsEl.appendChild(li);
        });
      }

      function setConfidence(note) {
        const label = note || 'unknown';
        confidenceEl.textContent = `状态：${label}`;
      }

      function isRealtimeFlightQuestion(question) {
        const hasFlightNo = /\b[a-z]{2}\s?\d{3,4}\b/i.test(question || '');
        return hasFlightNo;
      }

      function shouldOfferRealtimeConfirm(question) {
        const q = (question || '').toLowerCase();
        const hasFlightNo = /\b[a-z]{2}\s?\d{3,4}\b/i.test(question || '');
        const hasFlightWord = q.includes('航班') || q.includes('flight');
        const hasRealtimeIntent = ['实时', '动态', '状态', '延误', '晚点', '取消', '起飞', '降落', '到达', 'realtime', 'status', 'delay'].some(k => q.includes(k));
        return !hasFlightNo && hasFlightWord && hasRealtimeIntent;
      }

      function setRealtimeConfirmState(show, question = '') {
        if (show) {
          pendingRealtimeQuestion = question || '';
          realtimeConfirmBoxEl.classList.remove('hidden');
        } else {
          pendingRealtimeQuestion = '';
          realtimeConfirmBoxEl.classList.add('hidden');
        }
      }

      function buildRealtimeSummary(card) {
        const flightNo = card.flight_no || '未知航班';
        const status = card.status || '状态未知';
        const delay = card.delay_minutes === null || card.delay_minutes === undefined ? '未知' : `${card.delay_minutes} 分钟`;
        const dep = card.actual_departure || card.planned_departure || '-';
        const arr = card.actual_arrival || card.planned_arrival || '-';
        return `已获取实时航班卡片：${flightNo}，当前${status}，延误 ${delay}。\n起飞时间：${dep}；到达时间：${arr}。`;
      }

      async function renderRealtimeFlightDetails(details) {
        currentRealtimeDetails = details && typeof details === 'object' ? details : null;
        flightDetailListEl.innerHTML = '';

        if (!currentRealtimeDetails || Object.keys(currentRealtimeDetails).length === 0) {
          flightToggleDetailEl.classList.add('hidden');
          flightDetailsEl.classList.add('hidden');
          flightToggleDetailEl.textContent = '显示详细航班信息';
          return;
        }

        if (!flightDetailLabelMapLoaded || Object.keys(flightDetailLabelMap).length === 0) {
          await loadFlightDetailLabelMappings();
        }

        const entries = Object.entries(currentRealtimeDetails);
        const priorityMap = new Map(FLIGHT_DETAIL_PRIORITY.map((k, i) => [k, i]));
        entries.sort(([a], [b]) => {
          const pa = priorityMap.has(a) ? priorityMap.get(a) : 9999;
          const pb = priorityMap.has(b) ? priorityMap.get(b) : 9999;
          if (pa !== pb) return pa - pb;
          return a.localeCompare(b);
        });

        entries.forEach(([key, value]) => {
          const li = document.createElement('li');
          const safeVal = value === null || value === undefined ? '-' : (typeof value === 'object' ? JSON.stringify(value) : String(value));
          const label = getFlightDetailLabelByKey(key);
          li.innerHTML = `<strong>${label}</strong>：${safeVal} <span class="meta">(<code>${key}</code>)</span>`;
          flightDetailListEl.appendChild(li);
        });

        flightToggleDetailEl.classList.remove('hidden');
        flightDetailsEl.classList.add('hidden');
        flightToggleDetailEl.textContent = '显示详细航班信息';
      }

      async function renderRealtimeFlightCard(card, details = null) {
        if (!card) {
          flightCardEl.classList.add('hidden');
          await renderRealtimeFlightDetails(null);
          return;
        }
        flightNoEl.textContent = card.flight_no || '-';
        flightStatusEl.textContent = card.status || '-';
        flightPlannedDepEl.textContent = card.planned_departure || '-';
        flightActualDepEl.textContent = card.actual_departure || '-';
        flightPlannedArrEl.textContent = card.planned_arrival || '-';
        flightActualArrEl.textContent = card.actual_arrival || '-';
        flightDelayEl.textContent = card.delay_minutes === null || card.delay_minutes === undefined ? '-' : String(card.delay_minutes);
        const terminal = card.terminal || '-';
        const gate = card.gate || '-';
        flightTerminalGateEl.textContent = `${terminal} / ${gate}`;
        flightCardEl.classList.remove('hidden');
        await renderRealtimeFlightDetails(details);
      }

      async function submitFeedback(rating, correctedAnswer = '') {
        if (!lastResponse) {
          feedbackStatusEl.textContent = '请先完成一次问答。';
          return;
        }
        const payload = {
          answer_id: lastResponse.answer_id || null,
          question: lastResponse.question,
          answer: lastResponse.answer,
          confidence_note: lastResponse.confidence_note || 'unknown',
          rating,
          corrected_answer: correctedAnswer || null,
        };
        const res = await fetch('/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '反馈提交失败');
        const tips = [];
        if (data.patch_applied) {
          tips.push(`已触发知识补丁：${data.patch_path || 'unknown'}`);
        }
        if (data.patch_status && !data.patch_applied) {
          tips.push(`补丁状态：${data.patch_status}`);
        } else if (data.patch_status && data.patch_status !== 'applied') {
          tips.push(`补丁状态：${data.patch_status}`);
        }
        if (data.iterated_answer) {
          answerEl.textContent = data.iterated_answer;
          if (lastResponse) {
            lastResponse.answer = data.iterated_answer;
          }
          tips.push('已自动迭代答案');
        }
        const suffix = tips.length ? `，${tips.join('；')}` : '';
        feedbackStatusEl.textContent = `反馈已记录（${new Date().toLocaleTimeString()}）${suffix}。`;
      }

      async function ingestDefault(showStatus = false) {
        if (showStatus) {
          ingestStatus.textContent = '正在读取并入库，请稍候...';
        }
        const res = await fetch('/ingest/default', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.detail || '同步失败');
        }
        const now = new Date().toLocaleTimeString();
        ingestStatus.textContent = `同步完成：处理文档 ${data.processed_files} 个，索引片段 ${data.indexed_chunks} 条（${now}）。`;
        ingestStatus.classList.remove('error');
        return data;
      }

      askBtn.addEventListener('click', async () => {
        const question = questionInput.value.trim();
        if (!question) {
          setError('请先输入问题。');
          return;
        }

        clearError();
        askBtn.disabled = true;
        askBtn.textContent = '正在检索...';
        answerEl.textContent = '处理中，请稍候...';
        setConfidence('processing');

        try {
          if (autoSyncEl.checked && !isRealtimeFlightQuestion(question)) {
            await ingestDefault(false);
          }

          const res = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, top_k: Number(topKEl.value) }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || '请求失败');

          lastResponse = data;

          if (data.realtime_flight) {
            answerEl.textContent = buildRealtimeSummary(data.realtime_flight);
            setRealtimeConfirmState(false);
          } else {
            answerEl.textContent = data.answer;
            setRealtimeConfirmState(shouldOfferRealtimeConfirm(question), question);
          }
          renderCitations(data.citations);
          setConfidence(data.confidence_note || 'unknown');
          await renderRealtimeFlightCard(data.realtime_flight || null, data.realtime_flight_details || null);
          feedbackStatusEl.textContent = '';
        } catch (err) {
          setError(`问答失败：${err.message}`);
          renderCitations([]);
          setConfidence('error');
          setRealtimeConfirmState(false);
          await renderRealtimeFlightCard(null);
          lastResponse = null;
        } finally {
          askBtn.disabled = false;
          askBtn.textContent = '开始问答';
        }
      });

      confirmRealtimeBtn.addEventListener('click', async () => {
        if (!pendingRealtimeQuestion) return;
        confirmRealtimeBtn.disabled = true;
        const prevText = confirmRealtimeBtn.textContent;
        confirmRealtimeBtn.textContent = '查询中...';
        try {
          const res = await fetch('/flight/realtime', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: pendingRealtimeQuestion }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || '实时航班查询失败');

          answerEl.textContent = buildRealtimeSummary(data.realtime_flight || {});
          setConfidence(data.confidence_note || 'realtime-flight');
          renderCitations([]);
          await renderRealtimeFlightCard(data.realtime_flight || null, data.realtime_flight_details || null);
          setRealtimeConfirmState(false);
          lastResponse = {
            answer_id: null,
            question: data.question || pendingRealtimeQuestion,
            answer: data.answer || '',
            confidence_note: data.confidence_note || 'realtime-flight',
          };
        } catch (err) {
          feedbackStatusEl.textContent = `实时查询失败：${err.message}`;
        } finally {
          confirmRealtimeBtn.disabled = false;
          confirmRealtimeBtn.textContent = prevText;
        }
      });

      flightToggleDetailEl.addEventListener('click', () => {
        if (!currentRealtimeDetails) return;
        const hidden = flightDetailsEl.classList.contains('hidden');
        if (hidden) {
          flightDetailsEl.classList.remove('hidden');
          flightToggleDetailEl.textContent = '切换简洁展示';
        } else {
          flightDetailsEl.classList.add('hidden');
          flightToggleDetailEl.textContent = '显示详细航班信息';
        }
      });

      likeBtn.addEventListener('click', async () => {
        try {
          await submitFeedback(1);
        } catch (err) {
          feedbackStatusEl.textContent = `点赞失败：${err.message}`;
        }
      });

      dislikeBtn.addEventListener('click', async () => {
        try {
          await submitFeedback(-1);
        } catch (err) {
          feedbackStatusEl.textContent = `点踩失败：${err.message}`;
        }
      });

      submitCorrectionBtn.addEventListener('click', async () => {
        const corrected = correctedAnswerEl.value.trim();
        if (!corrected) {
          feedbackStatusEl.textContent = '请先填写纠错内容。';
          return;
        }
        try {
          await submitFeedback(-1, corrected);
        } catch (err) {
          feedbackStatusEl.textContent = `纠错提交失败：${err.message}`;
        }
      });

      ingestBtn.addEventListener('click', async () => {
        ingestBtn.disabled = true;
        ingestBtn.textContent = '同步中...';

        try {
          await ingestDefault(true);
        } catch (err) {
          ingestStatus.textContent = `同步失败：${err.message}`;
          ingestStatus.classList.add('error');
        } finally {
          ingestBtn.disabled = false;
          ingestBtn.textContent = '同步最新文档（data/documents）';
        }
      });

      chips.forEach((chip) => {
        chip.addEventListener('click', () => {
          questionInput.value = chip.dataset.q || '';
          questionInput.focus();
        });
      });

      loadFlightDetailLabelMappings();
    </script>
  </body>
</html>
